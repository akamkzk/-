server.port=${PORT:8080}
spring.application.name=blog-platform

# MySQL (local dev) / PostgreSQL (Render)
# Local: SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/blog_platform?...
# Render: SPRING_DATASOURCE_URL=jdbc:postgresql://host:5432/postgres
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/blog_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

# MyBatis-Plus
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# JWT
app.jwt.secret=${APP_JWT_SECRET:changeme}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# Upload path
app.upload.path=${APP_UPLOAD_PATH:/tmp/uploads}

# CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8080}
