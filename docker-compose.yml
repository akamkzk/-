services:
  # PostgreSQL 数据库 (Render) / MySQL (本地开发)
  postgres:
    image: postgres:16-alpine
    container_name: blog-postgres
    restart: always
    environment:
      POSTGRES_DB: blog_platform
      POSTGRES_USER: blog_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog_user -d blog_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 Spring Boot
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blog-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/blog_platform
      SPRING_DATASOURCE_USERNAME: blog_user
      SPRING_DATASOURCE_PASSWORD: changeme
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      APP_JWT_SECRET: changeme
      APP_JWT_EXPIRATION: 86400000
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:8080
      APP_UPLOAD_PATH: /tmp/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # 前端 Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blog-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
